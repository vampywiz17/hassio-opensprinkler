name: Build OpenSprinkler OSPi Multi-Arch

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: "Upstream tag, például v240_219. Üresen a legújabb tag épül."
        required: false
        type: string

      addon_version:
        description: "Home Assistant add-on verzió, például 0.0.8"
        required: true
        default: "0.0.8"
        type: string

  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/build-opensprinkler-ospi.yml"

permissions:
  contents: read
  packages: write

concurrency:
  group: opensprinkler-ospi-multiarch
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: https://github.com/opensprinklershop/OpenSprinkler-Firmware.git
  IMAGE_NAME: opensprinkler-ospi

jobs:
  build:
    name: Build or tag OpenSprinkler image
    runs-on: ubuntu-24.04

    steps:
      - name: Determine upstream and add-on versions
        id: source
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.source_tag }}
          REQUESTED_ADDON_VERSION: ${{ inputs.addon_version }}
        run: |
          set -euo pipefail

          ALL_TAGS="$(
            git ls-remote --tags --refs "${SOURCE_REPOSITORY}" |
              awk '{
                sub("refs/tags/", "", $2)
                print $2
              }' |
              grep -E '^v[0-9]+_[0-9]+$' || true
          )"

          if [[ -z "${ALL_TAGS}" ]]; then
            echo "::error::No matching upstream tags were found."
            exit 1
          fi

          if [[ -n "${REQUESTED_TAG}" ]]; then
            if [[ ! "${REQUESTED_TAG}" =~ ^v[0-9]+_[0-9]+$ ]]; then
              echo "::error::Invalid upstream tag format: ${REQUESTED_TAG}"
              echo "::error::Expected format: v240_219"
              exit 1
            fi

            if ! printf '%s\n' "${ALL_TAGS}" |
              grep -Fxq "${REQUESTED_TAG}"; then
              echo "::error::Upstream tag does not exist: ${REQUESTED_TAG}"
              exit 1
            fi

            SOURCE_TAG="${REQUESTED_TAG}"
          else
            SOURCE_TAG="$(
              printf '%s\n' "${ALL_TAGS}" |
                awk -F_ '
                  {
                    major = $1
                    sub(/^v/, "", major)

                    printf "%012d %012d %s\n",
                      major + 0,
                      $2 + 0,
                      $0
                  }
                ' |
                sort -k1,1n -k2,2n |
                tail -n 1 |
                awk '{print $3}'
            )"
          fi

          if [[ -z "${SOURCE_TAG}" ]]; then
            echo "::error::Unable to determine the upstream tag."
            exit 1
          fi

          ADDON_VERSION="${REQUESTED_ADDON_VERSION}"

          if [[ ! "${ADDON_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid add-on version: ${ADDON_VERSION}"
            echo "::error::Expected format: 0.0.8"
            exit 1
          fi

          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/${IMAGE_NAME}"

          echo "tag=${SOURCE_TAG}" >> "${GITHUB_OUTPUT}"
          echo "addon_version=${ADDON_VERSION}" >> "${GITHUB_OUTPUT}"
          echo "image=${IMAGE}" >> "${GITHUB_OUTPUT}"

          echo "Selected upstream tag: ${SOURCE_TAG}"
          echo "Selected add-on version: ${ADDON_VERSION}"
          echo "Firmware image: ${IMAGE}:${SOURCE_TAG}"
          echo "Add-on image: ${IMAGE}:${ADDON_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing image tags
        id: image
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
          ADDON_VERSION: ${{ steps.source.outputs.addon_version }}
        run: |
          set -euo pipefail

          SOURCE_IMAGE="${IMAGE}:${SOURCE_TAG}"
          ADDON_IMAGE="${IMAGE}:${ADDON_VERSION}"

          has_platforms() {
            local target="$1"

            if ! docker buildx imagetools inspect \
              "${target}" >/dev/null 2>&1; then
              return 1
            fi

            local manifest
            manifest="$(
              docker buildx imagetools inspect \
                --raw \
                "${target}"
            )"

            local has_amd64
            local has_arm64

            has_amd64="$(
              printf '%s' "${manifest}" |
                jq -r '
                  (.manifests // []) |
                  any(
                    .platform.os == "linux" and
                    .platform.architecture == "amd64"
                  )
                '
            )"

            has_arm64="$(
              printf '%s' "${manifest}" |
                jq -r '
                  (.manifests // []) |
                  any(
                    .platform.os == "linux" and
                    .platform.architecture == "arm64"
                  )
                '
            )"

            [[ "${has_amd64}" == "true" && "${has_arm64}" == "true" ]]
          }

          if has_platforms "${SOURCE_IMAGE}"; then
            echo "source_exists=true" >> "${GITHUB_OUTPUT}"
            echo "Complete firmware image exists: ${SOURCE_IMAGE}"
          else
            echo "source_exists=false" >> "${GITHUB_OUTPUT}"
            echo "Firmware image is missing or incomplete: ${SOURCE_IMAGE}"
          fi

          if has_platforms "${ADDON_IMAGE}"; then
            echo "addon_exists=true" >> "${GITHUB_OUTPUT}"
            echo "Complete add-on image exists: ${ADDON_IMAGE}"
          else
            echo "addon_exists=false" >> "${GITHUB_OUTPUT}"
            echo "Add-on image is missing or incomplete: ${ADDON_IMAGE}"
          fi

      - name: Clone tagged OpenSprinkler source
        if: steps.image.outputs.source_exists != 'true'
        shell: bash
        env:
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
        run: |
          set -euo pipefail

          git clone \
            --branch "${SOURCE_TAG}" \
            --single-branch \
            --depth 1 \
            "${SOURCE_REPOSITORY}" \
            source

          SOURCE_COMMIT="$(git -C source rev-parse HEAD)"

          echo "SOURCE_COMMIT=${SOURCE_COMMIT}" >> "${GITHUB_ENV}"
          echo "Checked out ${SOURCE_TAG}: ${SOURCE_COMMIT}"

      - name: Initialize required upstream submodules
        if: steps.image.outputs.source_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          cd source

          git submodule sync --recursive

          git submodule update \
            --init \
            --force \
            external/OpenThings-Framework-Firmware-Library

          git submodule update \
            --init \
            --force \
            external/TinyWebsockets

      - name: Initialize influxdb-cpp
        if: steps.image.outputs.source_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          cd source

          if git submodule update \
            --init \
            --force \
            external/influxdb-cpp; then

            echo "Using the influxdb-cpp commit recorded by the upstream tag."
          else
            echo "::warning::The recorded influxdb-cpp commit is unavailable."
            echo "::warning::Using the current default branch as fallback."

            git submodule deinit \
              --force \
              external/influxdb-cpp 2>/dev/null || true

            rm -rf external/influxdb-cpp
            rm -rf .git/modules/external/influxdb-cpp

            git clone \
              --depth 1 \
              https://github.com/orca-zhang/influxdb-cpp.git \
              external/influxdb-cpp
          fi

          test -f external/influxdb-cpp/influxdb.hpp

      - name: Verify build inputs
        if: steps.image.outputs.source_exists != 'true'
        shell: bash
        run: |
          set -euo pipefail

          test -f source/build2.sh
          test -f source/external/influxdb-cpp/influxdb.hpp

          test -f \
            source/external/OpenThings-Framework-Firmware-Library/LinuxLocalServer.cpp

          test -d \
            source/external/TinyWebsockets/tiny_websockets_lib/src

      - name: Build and push multi-arch image
        if: steps.image.outputs.source_exists != 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
          ADDON_VERSION: ${{ steps.source.outputs.addon_version }}
        run: |
          set -euo pipefail

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --provenance=true \
            --sbom=true \
            --label "org.opencontainers.image.source=${SOURCE_REPOSITORY}" \
            --label "org.opencontainers.image.version=${SOURCE_TAG}" \
            --label "org.opencontainers.image.revision=${SOURCE_COMMIT}" \
            --label "org.opencontainers.image.title=OpenSprinkler OSPi Multi-Arch" \
            --tag "${IMAGE}:${SOURCE_TAG}" \
            --tag "${IMAGE}:${ADDON_VERSION}" \
            --cache-from "type=gha" \
            --cache-to "type=gha,mode=max" \
            --push \
            --file - \
            ./source <<'DOCKERFILE'
          FROM debian:bookworm-slim AS os-build

          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update \
           && apt-get install -y --no-install-recommends \
                bash \
                g++ \
                libmosquittopp-dev \
                libssl-dev \
                libi2c-dev \
                libmodbus-dev \
                libbluetooth-dev \
                libcurl4-openssl-dev \
           && rm -rf /var/lib/apt/lists/*

          COPY . /OpenSprinkler
          WORKDIR /OpenSprinkler

          RUN GPIO_SIMULATION=1 bash ./build2.sh

          FROM debian:bookworm-slim

          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update \
           && apt-get install -y --no-install-recommends \
                ca-certificates \
                libstdc++6 \
                libmosquittopp1 \
                libssl3 \
                libcurl4 \
                libi2c0 \
                libmodbus5 \
                libbluetooth3 \
           && rm -rf /var/lib/apt/lists/*

          RUN mkdir -p /OpenSprinkler /data/logs

          COPY --from=os-build \
            /OpenSprinkler/OpenSprinkler \
            /OpenSprinkler/OpenSprinkler

          WORKDIR /OpenSprinkler

          VOLUME ["/data"]
          EXPOSE 8080

          CMD ["/OpenSprinkler/OpenSprinkler", "-d", "/data"]
          DOCKERFILE

      - name: Create add-on version tag from existing firmware image
        if: >-
          steps.image.outputs.source_exists == 'true' &&
          steps.image.outputs.addon_exists != 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
          ADDON_VERSION: ${{ steps.source.outputs.addon_version }}
        run: |
          set -euo pipefail

          SOURCE_IMAGE="${IMAGE}:${SOURCE_TAG}"
          ADDON_IMAGE="${IMAGE}:${ADDON_VERSION}"

          docker buildx imagetools create \
            --tag "${ADDON_IMAGE}" \
            "${SOURCE_IMAGE}"

          echo "Created add-on version tag:"
          echo "${ADDON_IMAGE}"

      - name: Verify published image tags
        if: >-
          steps.image.outputs.source_exists != 'true' ||
          steps.image.outputs.addon_exists != 'true'
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
          ADDON_VERSION: ${{ steps.source.outputs.addon_version }}
        run: |
          set -euo pipefail

          verify_platforms() {
            local target="$1"

            echo "Inspecting ${target}"

            local manifest
            manifest="$(
              docker buildx imagetools inspect \
                --raw \
                "${target}"
            )"

            printf '%s' "${manifest}" |
              jq -e '
                (.manifests // []) |
                any(
                  .platform.os == "linux" and
                  .platform.architecture == "amd64"
                )
              ' >/dev/null

            printf '%s' "${manifest}" |
              jq -e '
                (.manifests // []) |
                any(
                  .platform.os == "linux" and
                  .platform.architecture == "arm64"
                )
              ' >/dev/null
          }

          verify_platforms "${IMAGE}:${SOURCE_TAG}"
          verify_platforms "${IMAGE}:${ADDON_VERSION}"

          echo "Both tags contain:"
          echo "  linux/amd64"
          echo "  linux/arm64"

      - name: Workflow summary
        if: always()
        shell: bash
        env:
          IMAGE: ${{ steps.source.outputs.image }}
          SOURCE_TAG: ${{ steps.source.outputs.tag }}
          ADDON_VERSION: ${{ steps.source.outputs.addon_version }}
          SOURCE_EXISTS: ${{ steps.image.outputs.source_exists }}
          ADDON_EXISTS: ${{ steps.image.outputs.addon_exists }}
        run: |
          set -euo pipefail

          {
            echo "## OpenSprinkler OSPi multi-arch image"
            echo
            echo "- Upstream repository: \`${SOURCE_REPOSITORY}\`"
            echo "- Upstream tag: \`${SOURCE_TAG}\`"
            echo "- Firmware image: \`${IMAGE}:${SOURCE_TAG}\`"
            echo "- Add-on image: \`${IMAGE}:${ADDON_VERSION}\`"
            echo "- Platforms: \`linux/amd64\`, \`linux/arm64\`"
            echo

            if [[ "${SOURCE_EXISTS}" != "true" ]]; then
              echo "- Result: firmware built and both tags published"
            elif [[ "${ADDON_EXISTS}" != "true" ]]; then
              echo "- Result: existing firmware image tagged as ${ADDON_VERSION}"
            else
              echo "- Result: both complete image tags already existed; nothing changed"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
